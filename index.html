<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🛒 Meu Carrinho PRO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #d9e6f5 0%, #cbdde9 100%);
      --container-bg: rgba(245, 248, 250, 0.92);
      --text-main: #0b3b5f;
      --text-sub: #2c5a6e;
      --card-bg: #ffffffdb;
      --input-bg: #ffffffcc;
      --border-color: #bdd4e2;
      --shadow: rgba(0, 0, 0, 0.1);
      --item-category-bg: #d4e3ef;
    }
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --container-bg: rgba(30, 41, 59, 0.96);
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --card-bg: #1e293b;
      --input-bg: #334155;
      --border-color: #475569;
      --shadow: rgba(0, 0, 0, 0.4);
      --item-category-bg: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
    
    body { background: var(--bg-gradient); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; color: var(--text-main); }
    
    .theme-switch { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 4px 10px var(--shadow); }
    
    .glass-container { max-width: 600px; width: 100%; background: var(--container-bg); backdrop-filter: blur(12px); border-radius: 40px; padding: 30px 25px; box-shadow: 0 20px 40px var(--shadow); }
    
    h1 { font-size: 1.8rem; text-align: center; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sub { text-align: center; color: var(--text-sub); font-size: 0.85rem; margin-bottom: 35px; display: block; opacity: 0.8; }
    
    /* Espaçamento entre grupos de input */
    .group-box { 
      background: var(--input-bg); 
      border-radius: 25px; 
      padding: 12px 18px; 
      margin-bottom: 20px; /* Mais espaço entre as seções */
      border: 1px solid var(--border-color); 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      flex-wrap: wrap; 
    }
    
    input, select { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 1rem; padding: 10px; flex: 1; min-width: 80px; }
    
    .qtd-container {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      padding: 0 10px;
      margin: 0 5px;
      border: 1px solid var(--border-color);
    }
    
    .qtd-container span { font-weight: bold; color: var(--text-sub); font-size: 0.9rem; margin-right: -5px; }

    #qtd { max-width: 60px; border: none !important; text-align: center; font-weight: 800; padding: 10px 5px; }

    [data-theme="dark"] .qtd-container { background: rgba(255, 255, 255, 0.05); }
    
    button { border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
    button:active { transform: scale(0.95); }

    .lista-items { list-style: none; margin: 25px 0; max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .lista-items li { background: var(--card-bg); margin-bottom: 18px; padding: 22px; border-radius: 28px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border-color); box-shadow: 0 6px 12px var(--shadow); }
    
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .item-nome { font-weight: 700; font-size: 1.1rem; display: block; }
    .item-meta { font-size: 0.8rem; color: var(--text-sub); margin-top: 5px; display: flex; align-items: center; gap: 10px; }
    .item-categoria-tag { background: var(--item-category-bg); padding: 3px 10px; border-radius: 12px; font-weight: 600; }
    .item-preco { color: #c2410c; font-weight: 800; background: #ffedd5; padding: 8px 15px; border-radius: 15px; font-size: 1rem; min-width: 90px; text-align: center; }
    
    .item-actions { display: flex; gap: 10px; border-top: 1px solid var(--border-color); padding-top: 15px; }
    .btn-check { background: #dcfce7; color: #15803d; flex: 2; justify-content: center; font-size: 0.95rem; }
    .btn-price { background: #e0f2fe; color: #0369a1; flex: 1; justify-content: center; }
    .btn-delete { background: #fee2e2; color: #b91c1c; padding: 12px 15px; }

    /* MODAIS */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 3000; }
    .modal-card { background: var(--container-bg); padding: 30px; border-radius: 35px; width: 90%; max-width: 340px; text-align: center; border: 1px solid var(--border-color); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
    .modal-card h3 { color: var(--text-main); margin-bottom: 12px; }
    .modal-card p { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 25px; line-height: 1.4; }
    .modal-card input { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 18px; margin-bottom: 20px; text-align: center; font-size: 1.4rem; padding: 12px; color: var(--text-main); }

    .total-area { background: var(--card-bg); border-radius: 35px; padding: 22px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); margin-top: 15px; }
    .total-box { font-size: 1.7rem; font-weight: 800; color: #22c55e; }
    .checked { border-left: 10px solid #22c55e !important; }
    .checked .item-nome { text-decoration: line-through; opacity: 0.6; }
  </style>
</head>
<body>

<button class="theme-switch" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>

<div id="modalPreco" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modalTitle">Valor do Item</h3>
        <input type="number" id="modalInput" placeholder="0.00" step="0.01" inputmode="decimal">
        <div style="display: flex; gap: 12px;">
            <button onclick="fecharModal('modalPreco')" style="background: #ccc; flex: 1; justify-content: center;">Sair</button>
            <button onclick="confirmarPreco()" style="background: #22c55e; color: white; flex: 1; justify-content: center;">Salvar</button>
        </div>
    </div>
</div>

<div id="modalConfirm" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-exclamation-circle" style="color: #ef4444; font-size: 2.5rem; margin-bottom: 15px;"></i>
        <h3 id="confirmTitle">Atenção</h3>
        <p id="confirmMsg">Deseja realizar esta ação?</p>
        <div style="display: flex; gap: 12px;">
            <button onclick="fecharModal('modalConfirm')" style="background: #ccc; flex: 1; justify-content: center;">Não</button>
            <button onclick="confirmarAcao()" style="background: #ef4444; color: white; flex: 1; justify-content: center;">Sim, Confirmar</button>
        </div>
    </div>
</div>

<div class="glass-container">
  <h1><i class="fas fa-cart-shopping"></i> Meu Carrinho <i class="fas fa-crown" style="color: #f5a623;"></i></h1>
  <span class="sub">✨ visual moderno · cálculo automático ✨</span>

  <div class="group-box">
    <input type="text" id="novaLista" placeholder="Nova lista (Ex: Churrasco)..." autocomplete="off">
    <button onclick="criarLista()" style="background: #2c9e6e; color: white;"><i class="fas fa-plus"></i> Criar</button>
  </div>

  <div class="group-box" style="background: rgba(59, 130, 246, 0.05);">
    <label style="font-weight: 700; font-size: 0.9rem; padding-left: 5px;">Lista Ativa:</label>
    <select id="listas" onchange="trocarLista()"></select>
    <button onclick="abrirConfirmacaoExcluirLista()" style="background: #fee2e2; color: #b91c1c; padding: 10px 12px;" title="Excluir Lista Inteira">
      <i class="fas fa-trash-alt"></i>
    </button>
  </div>

  <div class="group-box">
    <input type="text" id="produto" placeholder="O que vai comprar?" autocomplete="off" style="flex: 2;">
    
    <div class="qtd-container">
      <span>x</span>
      <input type="number" id="qtd" value="1" min="1" placeholder="Qtd">
    </div>

    <select id="categoria" style="flex: 1.5;">
      <option value="Mercado">🛒 Mercado</option>
      <option value="Farmácia">💊 Farmácia</option>
      <option value="Hortifruti">🥑 Hortifruti</option>
      <option value="Limpeza">🧼 Limpeza</option>
      <option value="Outros">✨ Outros</option>
    </select>
    <button onclick="adicionar()" style="background: #3b82f6; color: white;"><i class="fas fa-cart-plus"></i></button>
  </div>

  <ul id="lista" class="lista-items"></ul>

  <div class="total-area">
    <div style="display: flex; flex-direction: column;">
        <span style="font-weight: 700; font-size: 0.85rem; color: var(--text-sub);">TOTAL PAGO:</span>
        <div class="total-box">R$ <span id="total">0,00</span></div>
    </div>
    <button onclick="abrirConfirmacaoLimpar()" style="background: #fee2e2; color: #b91c1c; padding: 15px 20px;" title="Limpar Itens da Lista">
      <i class="fas fa-broom"></i>
    </button>
  </div>
</div>

<script>
  let banco = JSON.parse(localStorage.getItem('bancoListas')) || {};
  let listaAtual = localStorage.getItem('listaAtual') || null;
  let tempIndex = null;
  let acaoConfirmacao = ""; // "limparItens", "removerItem", "excluirLista"

  function salvar() {
    localStorage.setItem('bancoListas', JSON.stringify(banco));
    localStorage.setItem('listaAtual', listaAtual);
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
    document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    localStorage.setItem('tema', isDark ? 'light' : 'dark');
  }

  function carregarTema() {
    if (localStorage.getItem('tema') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
    }
  }

  function atualizarSelect() {
    const select = document.getElementById('listas');
    const nomes = Object.keys(banco);
    if (nomes.length === 0) {
      select.innerHTML = '<option disabled selected>Nenhuma lista</option>';
      listaAtual = null;
    } else {
      select.innerHTML = '';
      nomes.forEach(nome => {
        const opt = document.createElement('option');
        opt.value = nome; opt.textContent = nome;
        if (nome === listaAtual) opt.selected = true;
        select.appendChild(opt);
      });
      if (!listaAtual) listaAtual = nomes[0];
    }
    salvar();
  }

  function criarLista() {
    const input = document.getElementById('novaLista');
    const nome = input.value.trim();
    if (!nome || banco[nome]) return;
    banco[nome] = []; listaAtual = nome; input.value = '';
    salvar(); atualizarSelect(); atualizar();
  }

  function trocarLista() { listaAtual = document.getElementById('listas').value; salvar(); atualizar(); }

  function adicionar() {
    const prodInput = document.getElementById('produto');
    const qtdInput = document.getElementById('qtd');
    const nome = prodInput.value.trim();
    const qtd = parseInt(qtdInput.value) || 1;
    if (!listaAtual || !nome) return;
    banco[listaAtual].push({ nome, categoria: document.getElementById('categoria').value, preco: null, qtd: qtd, comprado: false });
    prodInput.value = ''; qtdInput.value = '1';
    atualizar();
  }

  function atualizar() {
    const ul = document.getElementById('lista');
    ul.innerHTML = '';
    let totalGeral = 0;
    if (!listaAtual || !banco[listaAtual]) { document.getElementById('total').innerText = "0,00"; return; }

    banco[listaAtual].forEach((item, i) => {
      const q = parseInt(item.qtd) || 1;
      const p = parseFloat(item.preco) || 0;
      const subtotal = p * q;
      const li = document.createElement('li');
      if (item.comprado) li.className = 'checked';
      li.innerHTML = `
        <div class="item-header">
          <div class="item-info">
            <span class="item-nome">${item.nome}</span>
            <div class="item-meta">
               <span class="item-categoria-tag">${item.categoria}</span>
               <span>Qtd: <strong>${q}</strong></span>
            </div>
          </div>
          <div class="item-preco">R$ ${subtotal.toFixed(2)}</div>
        </div>
        <div class="item-actions">
          <button class="btn-check" onclick="toggle(${i})"><i class="fas ${item.comprado ? 'fa-undo' : 'fa-check'}"></i> ${item.comprado ? 'Desfazer' : 'No Carrinho'}</button>
          <button class="btn-price" onclick="abrirModalPreco(${i})"><i class="fas fa-tag"></i></button>
          <button class="btn-delete" onclick="abrirConfirmacaoRemover(${i})"><i class="fas fa-trash"></i></button>
        </div>
      `;
      ul.appendChild(li);
      if (item.comprado) totalGeral += subtotal;
    });
    document.getElementById('total').innerText = totalGeral.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    salvar();
  }

  // LOGICA MODAL
  function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

  function abrirModalPreco(i) {
    tempIndex = i;
    document.getElementById('modalTitle').innerText = banco[listaAtual][i].nome;
    document.getElementById('modalInput').value = banco[listaAtual][i].preco || "";
    document.getElementById('modalPreco').style.display = 'flex';
    document.getElementById('modalInput').focus();
  }

  function confirmarPreco() {
    const val = document.getElementById('modalInput').value;
    if (val !== "") { banco[listaAtual][tempIndex].preco = parseFloat(val); atualizar(); }
    fecharModal('modalPreco');
  }

  // CONFIRMAÇÕES
  function abrirConfirmacaoRemover(i) {
    tempIndex = i; acaoConfirmacao = "removerItem";
    document.getElementById('confirmTitle').innerText = "Remover Produto";
    document.getElementById('confirmMsg').innerText = "Excluir '" + banco[listaAtual][i].nome + "'?";
    document.getElementById('modalConfirm').style.display = 'flex';
  }

  function abrirConfirmacaoLimpar() {
    if (!listaAtual || banco[listaAtual].length === 0) return;
    acaoConfirmacao = "limparItens";
    document.getElementById('confirmTitle').innerText = "Limpar Itens";
    document.getElementById('confirmMsg').innerText = "Remover todos os itens desta lista?";
    document.getElementById('modalConfirm').style.display = 'flex';
  }

  function abrirConfirmacaoExcluirLista() {
    if (!listaAtual) return;
    acaoConfirmacao = "excluirLista";
    document.getElementById('confirmTitle').innerText = "Excluir Lista";
    document.getElementById('confirmMsg').innerText = "Deseja APAGAR COMPLETAMENTE a lista '" + listaAtual + "'?";
    document.getElementById('modalConfirm').style.display = 'flex';
  }

  function confirmarAcao() {
    if (acaoConfirmacao === "limparItens") {
      banco[listaAtual] = [];
    } else if (acaoConfirmacao === "removerItem") {
      banco[listaAtual].splice(tempIndex, 1);
    } else if (acaoConfirmacao === "excluirLista") {
      delete banco[listaAtual];
      const nomes = Object.keys(banco);
      listaAtual = nomes.length > 0 ? nomes[0] : null;
      atualizarSelect();
    }
    atualizar();
    fecharModal('modalConfirm');
  }

  function toggle(i) { banco[listaAtual][i].comprado = !banco[listaAtual][i].comprado; atualizar(); }

  carregarTema(); atualizarSelect(); atualizar();
</script>
</body>
</html>
