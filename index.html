<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🛒 Meu Carrinho PRO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #d9e6f5 0%, #cbdde9 100%);
      --container-bg: rgba(245, 248, 250, 0.92);
      --text-main: #0b3b5f;
      --text-sub: #2c5a6e;
      --card-bg: #ffffffdb;
      --input-bg: #ffffffcc;
      --border-color: #bdd4e2;
      --shadow: rgba(0, 0, 0, 0.1);
      --item-category-bg: #d4e3ef;
    }
    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --container-bg: rgba(30, 41, 59, 0.96);
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --card-bg: #1e293b;
      --input-bg: #334155;
      --border-color: #475569;
      --shadow: rgba(0, 0, 0, 0.4);
      --item-category-bg: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
    
    body { background: var(--bg-gradient); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; color: var(--text-main); }
    
    .theme-switch { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 4px 10px var(--shadow); }
    
    .glass-container { max-width: 600px; width: 100%; background: var(--container-bg); backdrop-filter: blur(12px); border-radius: 40px; padding: 25px; box-shadow: 0 20px 40px var(--shadow); }
    
    h1 { font-size: 1.7rem; text-align: center; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .sub { text-align: center; color: var(--text-sub); font-size: 0.8rem; margin-bottom: 20px; display: block; opacity: 0.8; }
    
    .group-box { background: var(--input-bg); border-radius: 25px; padding: 8px 15px; margin-bottom: 12px; border: 1px solid var(--border-color); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    
    input, select { background: transparent; border: none; outline: none; color: var(--text-main); font-size: 0.95rem; padding: 8px; flex: 1; min-width: 80px; }
    
    /* NOVO ESTILO PARA O CONTADOR DE QUANTIDADE */
    .qtd-container {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      padding: 0 8px;
      margin: 0 5px;
      border: 1px solid var(--border-color);
    }
    
    .qtd-container span {
      font-weight: bold;
      color: var(--text-sub);
      font-size: 0.8rem;
      margin-right: -5px;
    }

    #qtd {
      max-width: 55px;
      border: none !important;
      text-align: center;
      font-weight: 800;
      padding: 8px 5px;
    }

    [data-theme="dark"] .qtd-container {
      background: rgba(255, 255, 255, 0.05);
    }
    
    button { border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
    button:active { transform: scale(0.95); }

    .lista-items { list-style: none; margin: 15px 0; max-height: 350px; overflow-y: auto; padding-right: 5px; }
    .lista-items li { background: var(--card-bg); margin-bottom: 12px; padding: 18px; border-radius: 25px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 8px var(--shadow); }
    
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .item-nome { font-weight: 700; font-size: 1.05rem; display: block; }
    .item-meta { font-size: 0.75rem; color: var(--text-sub); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
    .item-categoria-tag { background: var(--item-category-bg); padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .item-preco { color: #c2410c; font-weight: 800; background: #ffedd5; padding: 6px 12px; border-radius: 12px; font-size: 0.95rem; min-width: 80px; text-align: center; }
    
    .item-actions { display: flex; gap: 8px; border-top: 1px solid var(--border-color); padding-top: 10px; }
    .btn-check { background: #dcfce7; color: #15803d; flex: 2; justify-content: center; }
    .btn-price { background: #e0f2fe; color: #0369a1; flex: 1; justify-content: center; }
    .btn-delete { background: #fee2e2; color: #b91c1c; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 3000; }
    .modal-card { background: var(--container-bg); padding: 25px; border-radius: 30px; width: 90%; max-width: 320px; text-align: center; border: 1px solid var(--border-color); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
    .modal-card h3 { color: var(--text-main); margin-bottom: 10px; }
    .modal-card p { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 20px; }
    .modal-card input { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 15px; margin: 15px 0; text-align: center; font-size: 1.3rem; padding: 10px; color: var(--text-main); }

    .total-area { background: var(--card-bg); border-radius: 30px; padding: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); margin-top: 10px; }
    .total-box { font-size: 1.5rem; font-weight: 800; color: #22c55e; }
    .checked { border-left: 8px solid #22c55e !important; }
    .checked .item-nome { text-decoration: line-through; opacity: 0.6; }
  </style>
</head>
<body>

<button class="theme-switch" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>

<div id="modalPreco" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modalTitle">Preço Unitário</h3>
        <input type="number" id="modalInput" placeholder="0.00" step="0.01" inputmode="decimal">
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModal('modalPreco')" style="background: #ccc; flex: 1; justify-content: center;">Sair</button>
            <button onclick="confirmarPreco()" style="background: #22c55e; color: white; flex: 1; justify-content: center;">Salvar</button>
        </div>
    </div>
</div>

<div id="modalConfirm" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-exclamation-triangle" style="color: #ef4444; font-size: 2rem; margin-bottom: 15px;"></i>
        <h3>Atenção</h3>
        <p id="confirmMsg">Deseja excluir este item?</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModal('modalConfirm')" style="background: #ccc; flex: 1; justify-content: center;">Cancelar</button>
            <button onclick="confirmarAcao()" style="background: #ef4444; color: white; flex: 1; justify-content: center;">Confirmar</button>
        </div>
    </div>
</div>

<div class="glass-container">
  <h1><i class="fas fa-cart-shopping"></i> Meu Carrinho <i class="fas fa-crown" style="color: #f5a623;"></i></h1>
  <span class="sub">✨ visual moderno · cálculo automático ✨</span>

  <div class="group-box">
    <input type="text" id="novaLista" placeholder="Nova lista (Ex: Feira)..." autocomplete="off">
    <button onclick="criarLista()" style="background: #2c9e6e; color: white;"><i class="fas fa-plus"></i></button>
  </div>

  <div class="group-box">
    <label style="font-weight: 700; font-size: 0.85rem;">Lista:</label>
    <select id="listas" onchange="trocarLista()"></select>
  </div>

  <div class="group-box">
    <input type="text" id="produto" placeholder="O que vai comprar?" autocomplete="off" style="flex: 3;">
    
    <div class="qtd-container">
      <span>x</span>
      <input type="number" id="qtd" value="1" min="1" placeholder="Qtd" title="Quantidade">
    </div>

    <select id="categoria" style="flex: 2;">
      <option value="Mercado">🛒 Mercado</option>
      <option value="Farmácia">💊 Farmácia</option>
      <option value="Hortifruti">🥑 Hortifruti</option>
      <option value="Limpeza">🧼 Limpeza</option>
      <option value="Outros">✨ Outros</option>
    </select>
    <button onclick="adicionar()" style="background: #3b82f6; color: white;"><i class="fas fa-plus-circle"></i></button>
  </div>

  <ul id="lista" class="lista-items"></ul>

  <div class="total-area">
    <span style="font-weight: 700; font-size: 0.9rem;"><i class="fas fa-coins"></i> Total Pago:</span>
    <div class="total-box">R$ <span id="total">0,00</span></div>
    <button onclick="abrirConfirmacaoLimpar()" style="background: #fee2e2; color: #b91c1c;"><i class="fas fa-broom"></i></button>
  </div>
</div>

<script>
  let banco = JSON.parse(localStorage.getItem('bancoListas')) || {};
  let listaAtual = localStorage.getItem('listaAtual') || null;
  let tempIndex = null;
  let modoLimparTudo = false;

  function salvar() {
    localStorage.setItem('bancoListas', JSON.stringify(banco));
    localStorage.setItem('listaAtual', listaAtual);
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
    document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    localStorage.setItem('tema', isDark ? 'light' : 'dark');
  }

  function carregarTema() {
    if (localStorage.getItem('tema') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
    }
  }

  function atualizarSelect() {
    const select = document.getElementById('listas');
    const nomes = Object.keys(banco);
    select.innerHTML = nomes.length ? '' : '<option disabled selected>Crie uma lista</option>';
    nomes.forEach(nome => {
      const opt = document.createElement('option');
      opt.value = nome; opt.textContent = nome;
      if (nome === listaAtual) opt.selected = true;
      select.appendChild(opt);
    });
  }

  function criarLista() {
    const input = document.getElementById('novaLista');
    const nome = input.value.trim();
    if (!nome || banco[nome]) return;
    banco[nome] = []; listaAtual = nome; input.value = '';
    salvar(); atualizarSelect(); atualizar();
  }

  function trocarLista() { listaAtual = document.getElementById('listas').value; salvar(); atualizar(); }

  function adicionar() {
    const prodInput = document.getElementById('produto');
    const qtdInput = document.getElementById('qtd');
    const nome = prodInput.value.trim();
    const qtd = parseInt(qtdInput.value) || 1;
    if (!listaAtual || !nome) return;
    banco[listaAtual].push({ nome, categoria: document.getElementById('categoria').value, preco: null, qtd: qtd, comprado: false });
    prodInput.value = ''; qtdInput.value = '1';
    atualizar();
  }

  function atualizar() {
    const ul = document.getElementById('lista');
    ul.innerHTML = '';
    let totalGeral = 0;
    if (!listaAtual || !banco[listaAtual]) return;

    banco[listaAtual].forEach((item, i) => {
      const q = parseInt(item.qtd) || 1;
      const p = parseFloat(item.preco) || 0;
      const subtotal = p * q;
      const li = document.createElement('li');
      if (item.comprado) li.className = 'checked';
      li.innerHTML = `
        <div class="item-header">
          <div class="item-info">
            <span class="item-nome">${item.nome}</span>
            <div class="item-meta">
               <span class="item-categoria-tag">${item.categoria}</span>
               <span>Qtd: <strong>${q}</strong></span>
            </div>
          </div>
          <div class="item-preco">R$ ${subtotal.toFixed(2)}</div>
        </div>
        <div class="item-actions">
          <button class="btn-check" onclick="toggle(${i})"><i class="fas ${item.comprado ? 'fa-undo' : 'fa-check'}"></i></button>
          <button class="btn-price" onclick="abrirModalPreco(${i})"><i class="fas fa-tag"></i></button>
          <button class="btn-delete" onclick="abrirConfirmacaoRemover(${i})"><i class="fas fa-trash"></i></button>
        </div>
      `;
      ul.appendChild(li);
      if (item.comprado) totalGeral += subtotal;
    });
    document.getElementById('total').innerText = totalGeral.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    salvar();
  }

  function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

  function abrirModalPreco(i) {
    tempIndex = i;
    document.getElementById('modalTitle').innerText = banco[listaAtual][i].nome;
    document.getElementById('modalInput').value = banco[listaAtual][i].preco || "";
    document.getElementById('modalPreco').style.display = 'flex';
    document.getElementById('modalInput').focus();
  }

  function confirmarPreco() {
    const val = document.getElementById('modalInput').value;
    if (val !== "") { banco[listaAtual][tempIndex].preco = parseFloat(val); atualizar(); }
    fecharModal('modalPreco');
  }

  function abrirConfirmacaoRemover(i) {
    tempIndex = i; modoLimparTudo = false;
    document.getElementById('confirmMsg').innerText = "Deseja excluir este produto?";
    document.getElementById('modalConfirm').style.display = 'flex';
  }

  function abrirConfirmacaoLimpar() {
    modoLimparTudo = true;
    document.getElementById('confirmMsg').innerText = "Deseja limpar toda a lista?";
    document.getElementById('modalConfirm').style.display = 'flex';
  }

  function confirmarAcao() {
    if (modoLimparTudo) { banco[listaAtual] = []; } 
    else { banco[listaAtual].splice(tempIndex, 1); }
    atualizar(); fecharModal('modalConfirm');
  }

  function toggle(i) { banco[listaAtual][i].comprado = !banco[listaAtual][i].comprado; atualizar(); }

  carregarTema(); atualizarSelect(); atualizar();
</script>
</body>
</html>
