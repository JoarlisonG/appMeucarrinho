<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 Meu Carrinho PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #f0f4f8;
      --bg2: #e2eaf3;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --border: #d1dde8;
      --text: #0f2744;
      --text-sub: #5a7a96;
      --green: #16a34a;
      --green-light: #dcfce7;
      --blue: #2563eb;
      --blue-light: #dbeafe;
      --red: #dc2626;
      --red-light: #fee2e2;
      --orange: #ea580c;
      --orange-light: #fff7ed;
      --yellow: #ca8a04;
      --yellow-light: #fef9c3;
      --shadow: 0 2px 12px rgba(15,39,68,0.08);
      --shadow-lg: 0 8px 30px rgba(15,39,68,0.12);
      --radius: 20px;
    }
    [data-theme="dark"] {
      --bg: #0d1b2a;
      --bg2: #162233;
      --surface: #1a2c40;
      --surface2: #1e3450;
      --border: #2a4060;
      --text: #e8f0f8;
      --text-sub: #7aa0bf;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      padding: 20px 16px 40px;
      transition: background 0.3s, color 0.3s;
    }

    /* HEADER */
    .app-header {
      max-width: 640px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .app-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title .crown { color: #f59e0b; }

    .theme-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-sub);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: var(--shadow);
      transition: 0.2s;
    }
    .theme-btn:hover { transform: rotate(20deg); }

    /* MAIN CARD */
    .main-card {
      max-width: 640px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      padding: 14px 10px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }

    .stat-number {
      font-size: 1.4rem;
      font-weight: 800;
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-sub);
    }
    .stat-pending .stat-number { color: var(--orange); }
    .stat-done .stat-number { color: var(--green); }
    .stat-total .stat-number { color: var(--blue); }

    /* SECTION */
    .section {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-sub);
      margin-bottom: 10px;
    }

    /* INPUT ROW */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .field {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex: 1;
      min-width: 0;
      transition: border-color 0.2s;
    }
    .field:focus-within { border-color: var(--blue); }

    .field input, .field select {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 11px 4px;
      width: 100%;
      min-width: 0;
    }
    .field select option { background: var(--surface); }

    .field-icon { color: var(--text-sub); font-size: 0.8rem; margin-right: 6px; flex-shrink: 0; }

    /* BUTTONS */
    .btn {
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: 0.15s;
    }
    .btn:active { transform: scale(0.94); }

    .btn-blue { background: var(--blue); color: white; }
    .btn-blue:hover { background: #1d4ed8; }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { background: #15803d; }
    .btn-red-soft { background: var(--red-light); color: var(--red); }
    .btn-icon { padding: 11px 13px; }

    /* SEARCH SECTION */
    .search-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }

    .search-box {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-result {
      margin-top: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text);
      display: none;
      position: relative;
    }

    .search-result.loading::after {
      content: '';
      display: block;
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      background-size: 200%;
      animation: shimmer 1.2s infinite;
      margin-top: 10px;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .search-result .result-header {
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .add-from-search {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .add-chip {
      background: var(--blue-light);
      color: var(--blue);
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.15s;
    }
    .add-chip:hover { background: #bfdbfe; transform: scale(1.03); }
    [data-theme="dark"] .add-chip { background: #1e3a5f; color: #93c5fd; }

    /* LIST */
    .list-section { padding: 14px 18px; }

    .pending-header {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--orange);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .done-header {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--green);
      margin: 16px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-list { list-style: none; }

    .item-card {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .item-card.done {
      border-color: var(--green);
      border-left: 5px solid var(--green);
      opacity: 0.7;
    }
    .item-card.done .item-name { text-decoration: line-through; }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .item-name {
      font-weight: 700;
      font-size: 0.97rem;
      line-height: 1.3;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .cat-tag {
      font-size: 0.68rem;
      font-weight: 700;
      background: var(--border);
      color: var(--text-sub);
      border-radius: 20px;
      padding: 2px 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .qty-tag {
      font-size: 0.75rem;
      color: var(--text-sub);
      font-weight: 600;
    }

    .price-badge {
      background: var(--orange-light);
      color: var(--orange);
      font-weight: 800;
      font-size: 0.9rem;
      padding: 5px 12px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .price-badge.has-price { background: var(--green-light); color: var(--green); }

    .item-actions {
      display: flex;
      gap: 7px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .act-btn {
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: 0.15s;
      flex: 1;
      justify-content: center;
    }
    .act-btn:active { transform: scale(0.93); }
    .act-check { background: var(--green-light); color: var(--green); }
    .act-price { background: var(--blue-light); color: var(--blue); }
    .act-del { background: var(--red-light); color: var(--red); flex: 0; padding: 8px 10px; }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-sub);
      font-size: 0.88rem;
    }
    .empty-state i { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.4; }

    /* FOOTER */
    .footer-bar {
      padding: 16px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .total-info { }
    .total-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-sub); }
    .total-value { font-size: 1.6rem; font-weight: 800; color: var(--green); }

    /* MODALS */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9000;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 26px;
      width: 100%;
      max-width: 340px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .modal h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 8px; }
    .modal p { font-size: 0.88rem; color: var(--text-sub); margin-bottom: 20px; line-height: 1.5; }
    .modal-icon { font-size: 2rem; margin-bottom: 12px; }

    .modal input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 18px;
      outline: none;
    }
    .modal input:focus { border-color: var(--blue); }

    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 12px; border-radius: 14px; border: none; font-family: inherit; font-weight: 700; font-size: 0.9rem; cursor: pointer; }

    /* SCROLLBAR */
    .item-scroll { max-height: 480px; overflow-y: auto; }
    .item-scroll::-webkit-scrollbar { width: 4px; }
    .item-scroll::-webkit-scrollbar-track { background: transparent; }
    .item-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  </style>
</head>
<body>

<!-- MODAL PREÇO -->
<div class="overlay" id="overlayPreco">
  <div class="modal">
    <h3 id="priceModalTitle">Preço do item</h3>
    <input type="number" id="priceInput" placeholder="0,00" step="0.01" inputmode="decimal">
    <div class="modal-btns">
      <button onclick="closeModal('overlayPreco')" style="background:var(--border);color:var(--text)">Cancelar</button>
      <button onclick="savePrice()" style="background:var(--blue);color:white">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAÇÃO -->
<div class="overlay" id="overlayConfirm">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <h3 id="confirmTitle">Confirmar ação</h3>
    <p id="confirmMsg">Deseja continuar?</p>
    <div class="modal-btns">
      <button onclick="closeModal('overlayConfirm')" style="background:var(--border);color:var(--text)">Não</button>
      <button onclick="runConfirmAction()" style="background:var(--red);color:white">Sim, confirmar</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app-header">
  <div class="app-title">
    <i class="fas fa-cart-shopping"></i>
    Meu Carrinho
    <i class="fas fa-crown crown"></i>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
</div>

<div class="main-card">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item stat-pending">
      <span class="stat-number" id="statPending">0</span>
      <span class="stat-label">⏳ Faltam</span>
    </div>
    <div class="stat-item stat-done">
      <span class="stat-number" id="statDone">0</span>
      <span class="stat-label">✅ No carrinho</span>
    </div>
    <div class="stat-item stat-total">
      <span class="stat-number" id="statTotal">0</span>
      <span class="stat-label">📦 Total itens</span>
    </div>
  </div>

  <!-- LISTA SELECTOR -->
  <div class="section">
    <div class="section-label">Gerenciar listas</div>
    <div class="input-row" style="margin-bottom: 10px;">
      <div class="field">
        <i class="fas fa-list-ul field-icon"></i>
        <input type="text" id="novaLista" placeholder="Nome da nova lista...">
      </div>
      <button class="btn btn-green" onclick="criarLista()"><i class="fas fa-plus"></i> Criar</button>
    </div>
    <div class="input-row">
      <div class="field" style="flex: 1;">
        <i class="fas fa-bookmark field-icon"></i>
        <select id="listas" onchange="trocarLista()"></select>
      </div>
      <button class="btn btn-icon btn-red-soft" onclick="confirmExcluirLista()" title="Excluir lista">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>

  <!-- ADD ITEM -->
  <div class="section">
    <div class="section-label">Adicionar item</div>
    <div class="input-row" style="margin-bottom: 10px;">
      <div class="field" style="flex: 2;">
        <i class="fas fa-shopping-basket field-icon"></i>
        <input type="text" id="produto" placeholder="O que vai comprar?" autocomplete="off">
      </div>
      <div class="field" style="flex: 0; min-width: 80px;">
        <i class="fas fa-hashtag field-icon"></i>
        <input type="number" id="qtd" value="1" min="1" style="text-align:center; font-weight:800;">
      </div>
    </div>
    <div class="input-row">
      <div class="field" style="flex: 2;">
        <i class="fas fa-tag field-icon"></i>
        <select id="categoria">
          <option value="Mercado">🛒 Mercado</option>
          <option value="Farmácia">💊 Farmácia</option>
          <option value="Hortifruti">🥑 Hortifruti</option>
          <option value="Limpeza">🧼 Limpeza</option>
          <option value="Bebidas">🥤 Bebidas</option>
          <option value="Outros">✨ Outros</option>
        </select>
      </div>
      <button class="btn btn-blue" onclick="adicionar()"><i class="fas fa-cart-plus"></i> Adicionar</button>
    </div>
  </div>

  <!-- AI SEARCH -->
  <div class="search-section">
    <div class="section-label"><i class="fas fa-robot"></i> Pesquisador de item (IA)</div>
    <div class="search-box">
      <div class="field" style="flex: 1;">
        <i class="fas fa-magnifying-glass field-icon"></i>
        <input type="text" id="searchQuery" placeholder="Ex: itens para churrasco, café da manhã..." onkeydown="if(event.key==='Enter') searchItem()">
      </div>
      <button class="btn btn-blue" onclick="searchItem()" id="searchBtn"><i class="fas fa-sparkles"></i> Buscar</button>
    </div>
    <div class="search-result" id="searchResult"></div>
  </div>

  <!-- LIST -->
  <div class="list-section">
    <div class="item-scroll" id="listContainer">
      <div class="empty-state"><i class="fas fa-cart-plus"></i>Crie uma lista e adicione itens!</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer-bar">
    <div class="total-info">
      <div class="total-label">Total pago</div>
      <div class="total-value">R$ <span id="total">0,00</span></div>
    </div>
    <button class="btn btn-red-soft" onclick="confirmLimpar()">
      <i class="fas fa-broom"></i> Limpar lista
    </button>
  </div>

</div>

<script>
  // ── STATE ──────────────────────────────────────────────────
  let banco = JSON.parse(localStorage.getItem('bancoListas')) || {};
  let listaAtual = localStorage.getItem('listaAtual') || null;
  let tempIndex = null;
  let pendingAction = null;

  // ── PERSIST ────────────────────────────────────────────────
  function salvar() {
    localStorage.setItem('bancoListas', JSON.stringify(banco));
    localStorage.setItem('listaAtual', listaAtual);
  }

  // ── THEME ──────────────────────────────────────────────────
  function toggleTheme() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
    document.getElementById('themeBtn').innerHTML = dark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    localStorage.setItem('tema', dark ? 'light' : 'dark');
  }

  function carregarTema() {
    if (localStorage.getItem('tema') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
    }
  }

  // ── LISTAS ─────────────────────────────────────────────────
  function atualizarSelect() {
    const select = document.getElementById('listas');
    const nomes = Object.keys(banco);
    if (nomes.length === 0) {
      select.innerHTML = '<option disabled selected>Nenhuma lista</option>';
      listaAtual = null;
    } else {
      select.innerHTML = '';
      nomes.forEach(nome => {
        const opt = document.createElement('option');
        opt.value = nome; opt.textContent = nome;
        if (nome === listaAtual) opt.selected = true;
        select.appendChild(opt);
      });
      if (!listaAtual || !banco[listaAtual]) listaAtual = nomes[0];
    }
    salvar();
  }

  function criarLista() {
    const input = document.getElementById('novaLista');
    const nome = input.value.trim();
    if (!nome) return;
    if (banco[nome]) { input.style.borderColor = 'var(--red)'; setTimeout(() => input.style.borderColor = '', 1000); return; }
    banco[nome] = []; listaAtual = nome; input.value = '';
    salvar(); atualizarSelect(); renderizar();
  }

  function trocarLista() {
    listaAtual = document.getElementById('listas').value;
    salvar(); renderizar();
  }

  // ── ITEMS ──────────────────────────────────────────────────
  function adicionar() {
    const prodInput = document.getElementById('produto');
    const qtdInput = document.getElementById('qtd');
    const nome = prodInput.value.trim();
    if (!listaAtual || !nome) return;
    const qtd = parseInt(qtdInput.value) || 1;
    banco[listaAtual].push({
      nome,
      categoria: document.getElementById('categoria').value,
      preco: null,
      qtd,
      comprado: false
    });
    prodInput.value = ''; qtdInput.value = '1';
    renderizar();
  }

  function toggle(i) {
    banco[listaAtual][i].comprado = !banco[listaAtual][i].comprado;
    renderizar();
  }

  // ── RENDER ─────────────────────────────────────────────────
  function renderizar() {
    const container = document.getElementById('listContainer');
    if (!listaAtual || !banco[listaAtual]) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-cart-plus"></i>Crie uma lista e adicione itens!</div>';
      updateStats(0, 0, 0); document.getElementById('total').innerText = '0,00';
      return;
    }

    const items = banco[listaAtual];
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i>Lista vazia — adicione itens acima!</div>';
      updateStats(0, 0, 0); document.getElementById('total').innerText = '0,00';
      salvar(); return;
    }

    const pending = items.filter(i => !i.comprado);
    const done = items.filter(i => i.comprado);

    let html = '';
    let totalPago = 0;

    if (pending.length > 0) {
      html += `<div class="pending-header"><i class="fas fa-clock"></i> Faltam comprar (${pending.length})</div>`;
      html += '<ul class="item-list">';
      pending.forEach(item => {
        const idx = items.indexOf(item);
        html += buildItemCard(item, idx, false);
      });
      html += '</ul>';
    }

    if (done.length > 0) {
      html += `<div class="done-header"><i class="fas fa-check-circle"></i> No carrinho (${done.length})</div>`;
      html += '<ul class="item-list">';
      done.forEach(item => {
        const idx = items.indexOf(item);
        const q = parseInt(item.qtd) || 1;
        const p = parseFloat(item.preco) || 0;
        totalPago += p * q;
        html += buildItemCard(item, idx, true);
      });
      html += '</ul>';
    }

    container.innerHTML = html;
    updateStats(pending.length, done.length, items.length);
    document.getElementById('total').innerText = totalPago.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    salvar();
  }

  function buildItemCard(item, i, isDone) {
    const q = parseInt(item.qtd) || 1;
    const p = parseFloat(item.preco) || 0;
    const subtotal = p * q;
    const hasPrice = item.preco !== null;
    const priceText = hasPrice ? `R$ ${subtotal.toFixed(2).replace('.', ',')}` : 'R$ --';
    const checkIcon = isDone ? 'fa-undo' : 'fa-check';
    const checkLabel = isDone ? 'Desfazer' : 'Pegar';

    return `
      <li class="item-card ${isDone ? 'done' : ''}">
        <div class="item-top">
          <div>
            <div class="item-name">${item.nome}</div>
            <div class="item-meta">
              <span class="cat-tag">${item.categoria}</span>
              <span class="qty-tag">× ${q}</span>
            </div>
          </div>
          <div class="price-badge ${hasPrice ? 'has-price' : ''}">${priceText}</div>
        </div>
        <div class="item-actions">
          <button class="act-btn act-check" onclick="toggle(${i})"><i class="fas ${checkIcon}"></i> ${checkLabel}</button>
          <button class="act-btn act-price" onclick="openPriceModal(${i})"><i class="fas fa-tag"></i> Preço</button>
          <button class="act-btn act-del" onclick="confirmRemover(${i})"><i class="fas fa-trash"></i></button>
        </div>
      </li>
    `;
  }

  function updateStats(pending, done, total) {
    document.getElementById('statPending').innerText = pending;
    document.getElementById('statDone').innerText = done;
    document.getElementById('statTotal').innerText = total;
  }

  // ── MODALS ─────────────────────────────────────────────────
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function openPriceModal(i) {
    tempIndex = i;
    const item = banco[listaAtual][i];
    document.getElementById('priceModalTitle').innerText = item.nome;
    document.getElementById('priceInput').value = item.preco || '';
    openModal('overlayPreco');
    setTimeout(() => document.getElementById('priceInput').focus(), 100);
  }

  function savePrice() {
    const val = document.getElementById('priceInput').value;
    if (val !== '') { banco[listaAtual][tempIndex].preco = parseFloat(val); renderizar(); }
    closeModal('overlayPreco');
  }

  document.getElementById('priceInput').addEventListener('keydown', e => { if (e.key === 'Enter') savePrice(); });

  function confirmRemover(i) {
    tempIndex = i;
    document.getElementById('confirmTitle').innerText = 'Remover item';
    document.getElementById('confirmMsg').innerText = `Remover "${banco[listaAtual][i].nome}" da lista?`;
    pendingAction = 'removeItem';
    openModal('overlayConfirm');
  }

  function confirmLimpar() {
    if (!listaAtual || !banco[listaAtual] || banco[listaAtual].length === 0) return;
    document.getElementById('confirmTitle').innerText = 'Limpar lista';
    document.getElementById('confirmMsg').innerText = 'Remover todos os itens desta lista?';
    pendingAction = 'clearList';
    openModal('overlayConfirm');
  }

  function confirmExcluirLista() {
    if (!listaAtual) return;
    document.getElementById('confirmTitle').innerText = 'Excluir lista';
    document.getElementById('confirmMsg').innerText = `Apagar permanentemente a lista "${listaAtual}"?`;
    pendingAction = 'deleteList';
    openModal('overlayConfirm');
  }

  function runConfirmAction() {
    if (pendingAction === 'removeItem') {
      banco[listaAtual].splice(tempIndex, 1);
    } else if (pendingAction === 'clearList') {
      banco[listaAtual] = [];
    } else if (pendingAction === 'deleteList') {
      delete banco[listaAtual];
      const nomes = Object.keys(banco);
      listaAtual = nomes.length > 0 ? nomes[0] : null;
      atualizarSelect();
    }
    renderizar();
    closeModal('overlayConfirm');
  }

  // ── AI SEARCH ──────────────────────────────────────────────
  async function searchItem() {
    const query = document.getElementById('searchQuery').value.trim();
    if (!query) return;

    const resultDiv = document.getElementById('searchResult');
    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando...';
    resultDiv.style.display = 'block';
    resultDiv.className = 'search-result loading';
    resultDiv.innerHTML = '<div class="result-header"><i class="fas fa-robot"></i> IA pensando...</div>';

    const listaContext = listaAtual && banco[listaAtual] && banco[listaAtual].length > 0
      ? `A lista atual já tem: ${banco[listaAtual].map(i => i.nome).join(', ')}.`
      : '';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `Você é um assistente de lista de compras. Quando o usuário descreve o que procura, retorne SOMENTE um JSON válido no formato:
{
  "descricao": "Uma frase curta e útil sobre os itens sugeridos.",
  "itens": [
    {"nome": "Nome do produto", "categoria": "Mercado"}
  ]
}
Categorias permitidas: Mercado, Farmácia, Hortifruti, Limpeza, Bebidas, Outros.
Sugira de 4 a 8 itens relevantes. Não inclua itens que já estão na lista. Retorne somente o JSON, sem markdown ou texto extra.`,
          messages: [{ role: 'user', content: `${listaContext} Sugira itens para: ${query}` }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      let chipsHtml = '';
      if (parsed.itens && parsed.itens.length > 0) {
        chipsHtml = `<div class="add-from-search">`;
        parsed.itens.forEach(item => {
          chipsHtml += `<button class="add-chip" onclick="addFromSearch('${item.nome.replace(/'/g,"\\'")}','${item.categoria}')">
            <i class="fas fa-plus"></i> ${item.nome}
          </button>`;
        });
        chipsHtml += `</div>`;
      }

      resultDiv.className = 'search-result';
      resultDiv.innerHTML = `
        <div class="result-header"><i class="fas fa-sparkles"></i> Sugestões da IA</div>
        <p style="font-size:0.85rem;color:var(--text-sub);margin-bottom:10px;">${parsed.descricao}</p>
        ${chipsHtml}
      `;
    } catch (err) {
      resultDiv.className = 'search-result';
      resultDiv.innerHTML = `<div class="result-header" style="color:var(--red)"><i class="fas fa-exclamation-triangle"></i> Erro na busca</div>
        <p style="font-size:0.83rem;color:var(--text-sub);">Não foi possível obter sugestões. Verifique sua conexão.</p>`;
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sparkles"></i> Buscar';
  }

  function addFromSearch(nome, categoria) {
    if (!listaAtual) { alert('Crie uma lista primeiro!'); return; }
    banco[listaAtual].push({ nome, categoria, preco: null, qtd: 1, comprado: false });
    renderizar();

    // Flash feedback
    const chips = document.querySelectorAll('.add-chip');
    chips.forEach(c => { if (c.textContent.includes(nome)) { c.style.background = '#bbf7d0'; c.style.color = '#15803d'; c.disabled = true; } });
  }

  document.getElementById('searchQuery').addEventListener('keydown', e => { if (e.key === 'Enter') searchItem(); });
  document.getElementById('produto').addEventListener('keydown', e => { if (e.key === 'Enter') adicionar(); });
  document.getElementById('novaLista').addEventListener('keydown', e => { if (e.key === 'Enter') criarLista(); });

  // ── INIT ───────────────────────────────────────────────────
  carregarTema();
  atualizarSelect();
  renderizar();
</script>
</body>
</html>
